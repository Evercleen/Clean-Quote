<script>
const SYSTEM_PROMPT = `You are a post-construction cleaning estimator assistant. Analyze the uploaded architectural drawings and extract data needed for a cleaning quote. You are expected to READ and CALCULATE from the drawings — do not default to "not confirmed" unless the drawing is genuinely illegible or the sheet was not provided.

EXTRACTION RULES — follow these exactly:

SQUARE FOOTAGE: If floor plan sheets are provided, calculate SF by reading dimension strings on the drawings. Multiply length x width for each wing or zone, add them together, and report a total with the note "(calculated from dimension strings — verify with GC)". A working number from the drawings is always better than "not confirmed." If a finish schedule lists rooms with a specific flooring type, list every room name and add up the areas to get a total SF per material.

GLASS PANES — TWO-STEP METHOD (mandatory, no exceptions):

IMPORTANT: Never attempt to count individual panes directly from 1/8" scale overview elevation sheets. At that scale pane subdivisions are not reliably visible and any count will be fabricated. Instead use this two-step method:

STEP 1 — PANES PER TYPE (from window/door schedule or large-scale detail sheets):
If a window schedule, door schedule, or large-scale frame detail sheet is provided, read each window/door type and count exactly how many individual glass panes that type contains. A pane is one glass rectangle subdivided by a mullion, frame, or bar. Count every lite including sidelites, transoms, and door glass. Record: Type A = X panes, Type B = Y panes, etc.

CRITICAL — COUNT ALL GLASS REGARDLESS OF SHADING OR TYPE: Every glass rectangle counts as one pane whether it is clear, tinted, reflective, fritted, patterned, or spandrel. Shading, hatching, diagonal lines, solid fill, or any other graphic treatment on a glass rectangle in the drawing simply indicates a different glass type — it does NOT mean the pane is non-glass or should be excluded. Spandrel panels, vision glass, translucent glass, and decorative glass all require cleaning and all count equally. Never skip a pane because it looks different from the clear lites around it.

STEP 2 — INSTANCES PER ELEVATION (from overview elevation sheets):
On the 1/8" overview elevation sheets, do NOT count panes. Instead count how many times each window type tag (diamond symbol with type letter) appears on each elevation face. This is readable at 1/8" scale. Record: South elevation — Type A appears 4 times, Type C appears 2 times, etc.

STEP 3 — MULTIPLY:
Total panes per elevation = sum of (panes per type × instances of that type). Add all elevations together for the building total.

SHOW YOUR WORK in the table cell, for example:
"South elev: A×4(8) + C×2(6) + D×1(3) = 17 panes. North elev: A×6(12) + B×3(9) = 21 panes. Total = 38 panes"

If no window schedule or detail sheet was uploaded, report exactly which type counts are missing and what instances you can see on the elevations, so the user can provide the missing per-type pane counts to complete the calculation. Never fabricate or guess pane counts.

OUTPUT FORMAT — produce exactly these four sections. No other text.

## TABLE 1: BUILDING & GLASS OVERVIEW

| Item | Finding |
|---|---|
| Project Name | |
| Address | |
| Building Type | |
| Davis-Bacon | Yes / No — [public or private, county, state] |
| Total Gross Interior SF | [your calculated number, e.g. "~38,400 SF (calculated from floor plan dimension strings)"] |
| Exterior Glass Panes — Ground Access (<=10 ft) | [your counted number, e.g. "86 panes (counted from A-501, A-502, A-503)"] |
| Exterior Glass Panes — High Access (>10 ft) | [number or 0 if single story] |
| Total Exterior Panes | [sum] |
| Interior Glass (sidelites, corridors, observation) | [counted number or estimated from storefront type schedule] |
| Multi-Stall Restrooms | [number] |
| Single-Occupancy Restrooms | [number] |

## TABLE 2: INTERIOR FINISHES

| Material | Total SF | Labor Note |
|---|---|---|
| [Flooring type — product name] | [calculated SF or "~X,XXX SF est."] | |
| [Next flooring type] | [SF] | |
| Total Cabinets / Millwork | [LF — sum all casework] | Wipe down |
| Restroom Wall Tile | [SF — sum all restrooms] | Grout haze removal |
| Restroom Floor Tile | [SF — sum all restrooms] | Grout haze removal |

RULES FOR TABLE 2:
- ONE total SF number per flooring type — add up all rooms, do not list room by room
- If a finish schedule lists which rooms get which flooring, calculate: count the rooms, estimate average room size from floor plan, multiply. Show your math briefly in the cell, e.g. "~24,000 SF (~35 classrooms avg 680 SF + corridors est. 4,200 SF)"
- ONE combined LF total for ALL casework — add classroom casework + admin + lab + restroom vanities together
- ONE combined SF for all restroom wall tile across all restrooms
- ONE combined SF for all restroom floor tile across all restrooms
- Do NOT list countertops, ceiling tiles, tackboards, whiteboards, lockers, corner guards, or window film as separate line items

## LABOR NOTES
Maximum 6 bullet points. Only flag items that change your cleaning method or cost:
- Epoxy grout specified — note cure window risk
- VCT polish — note if spec requires it and who applies
- Window film — note cleaner restrictions
- Acoustic panels — vacuum only
- Any specialty surface requiring non-standard method
Do NOT include standard professional cleaning reminders.

## PRICING
- Davis-Bacon: Yes/No, county, state
- Interior clean rate: $X.XX – $X.XX per SF
- Glass rate: $X.XX – $X.XX per pane (lift required: yes/no)

CRITICAL: Never write "Not confirmed — GC area tabulation needed" for SF or pane counts if the relevant drawing sheets were provided. Calculate and count from what is on the page. Mark estimates with "~" and note the source. Only write "Not provided — sheet not uploaded" if that specific sheet type was genuinely absent from the upload.`;

Upload your architectural drawings. I will produce a clean, concise quote sheet with exactly what you need.

**What to upload:**

- A-101 / A-140 / A-144 — Floor plans

// ── Markdown renderer ──
function renderMarkdown(text) {
  if (!text) return "";
  let h = text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/^# (.+)$/gm,'<h1 class="md-h1">$1</h1>')
    .replace(/^## (.+)$/gm,'<h2 class="md-h2">$1</h2>')
    .replace(/^### (.+)$/gm,'<h3 class="md-h3">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong class="md-strong">$1</strong>')
    .replace(/\*(.+?)\*/g,'<em class="md-em">$1</em>')
    .replace(/`(.+?)`/g,'<code class="md-code">$1</code>')
    .replace(/^- (.+)$/gm,'<div class="md-li"><span class="md-bullet">&#9658;</span><span>$1</span></div>');
  h = h.replace(/(\|.+\|[\r\n]?)+/g, block => {
    const rows = block.trim().split("\n").filter(r=>r.trim());
    let t = '<div class="md-table-wrap"><table class="md-table">';
    let first = true;
    for (const row of rows) {
      if (row.replace(/[\|\-\:\s]/g,"") === "") continue;
      const cells = row.split("|").filter((_,i,a)=>i>0&&i<a.length-1);
      const tag = first ? "th" : "td";
      t += "<tr>" + cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join("") + "</tr>";
      first = false;
    }
    return t + "</table></div>";
  });
  return h.replace(/\n\n+/g,'<div class="md-gap"></div>').replace(/\n/g,"<br/>");
}

// ── Add message to DOM ──
function addMessage(role, content, opts={}) {
  const anchor = document.getElementById("bottom-anchor");
  const row = document.createElement("div");
  row.className = "msg-row" + (role==="user" ? " user" : "");
  if (opts.id) row.id = opts.id;

  const av = document.createElement("div");
  av.className = "msg-avatar " + (role==="user" ? "user" : "bot");
  av.textContent = role==="user" ? "👤" : "⚙";

  const bub = document.createElement("div");
  bub.className = "msg-bubble " + (role==="user" ? "user" : "bot");

  if (opts.loading) {
    bub.innerHTML = `<div class="dot-loader">
      <div class="dot" style="animation:blink 1.2s 0s infinite"></div>
      <div class="dot" style="animation:blink 1.2s 0.2s infinite"></div>
      <div class="dot" style="animation:blink 1.2s 0.4s infinite"></div>
      <span class="loader-text">${opts.loadingText||"Analyzing..."}</span>
    </div>`;
  } else {
    if (opts.previews && opts.previews.length) {
      const pr = document.createElement("div");
      pr.className = "preview-row";
      opts.previews.slice(0,6).forEach(src => {
        const img = document.createElement("img");
        img.className = "preview-img"; img.src = src;
        pr.appendChild(img);
      });
      if (opts.totalFiles > opts.previews.length) {
        const more = document.createElement("div");
        more.className = "preview-more";
        more.textContent = "+" + (opts.totalFiles - opts.previews.length);
        pr.appendChild(more);
      }
      bub.appendChild(pr);
    }
    if (opts.pdfNames && opts.pdfNames.length) {
      const pr = document.createElement("div");
      pr.className = "preview-row";
      opts.pdfNames.forEach(n => {
        const chip = document.createElement("span");
        chip.className = "pdf-chip";
        chip.textContent = "📄 " + n;
        pr.appendChild(chip);
      });
      bub.appendChild(pr);
    }
    const md = document.createElement("div");
    md.innerHTML = renderMarkdown(content);
    bub.appendChild(md);
  }

  row.appendChild(av);
  row.appendChild(bub);
  anchor.parentNode.insertBefore(row, anchor);
  anchor.scrollIntoView({behavior:"smooth"});
  return row;
}

// ── File helpers ──
function toBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function toPreview(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}

function compressImage(file) {
  return new Promise(resolve => {
    const MAX_BYTES = 4.5 * 1024 * 1024; // 4.5MB hard ceiling
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);

      // Try progressively smaller sizes until under 4.5MB
      const attempts = [
        { maxDim: 2400, quality: 0.85 },
        { maxDim: 2000, quality: 0.82 },
        { maxDim: 1800, quality: 0.80 },
        { maxDim: 1600, quality: 0.78 },
        { maxDim: 1400, quality: 0.75 },
        { maxDim: 1200, quality: 0.72 },
        { maxDim: 1000, quality: 0.70 },
      ];

      let attemptIndex = 0;

      function tryCompress() {
        const { maxDim, quality } = attempts[attemptIndex];
        let { width: w, height: h } = img;
        const s = Math.min(1, maxDim / Math.max(w, h));
        w = Math.round(w * s);
        h = Math.round(h * s);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        c.toBlob(blob => {
          if (blob.size <= MAX_BYTES || attemptIndex >= attempts.length - 1) {
            // Under limit or last attempt — use this
            const r = new FileReader();
            r.onload = () => resolve({
              data: r.result.split(",")[1],
              mediaType: "image/jpeg",
              finalDim: maxDim,
              finalSize: Math.round(blob.size / 1024) + "KB"
            });
            r.readAsDataURL(blob);
          } else {
            // Still too big — try next smaller size
            attemptIndex++;
            tryCompress();
          }
        }, "image/jpeg", quality);
      }

      tryCompress();
    };
    img.onerror = async () => {
      URL.revokeObjectURL(url);
      const data = await toBase64(file);
      resolve({ data, mediaType: file.type });
    };
    img.src = url;
  });
}

// ── API call ──
async function callAPI(contentParts, systemOverride) {
  const msgs = [...conversationHistory, {role:"user", content:contentParts}];
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:3000,
      system: systemOverride || SYSTEM_PROMPT,
      messages: msgs
    })
  });
  if (!resp.ok) {
    const e = await resp.json().catch(()=>({}));
    throw new Error(e?.error?.message || "HTTP " + resp.status);
  }
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  if (!text) throw new Error("Empty response from API");
  conversationHistory.push({role:"user",content:contentParts});
  conversationHistory.push({role:"assistant",content:text});
  return text;
}

// ── Main send handler ──
async function handleSend() {
  if (isLoading) return;
  const textEl = document.getElementById("text-input");
  const inputText = textEl.value.trim();
  if (!pendingFiles.length && !inputText) return;
  hideError();

  // Text-only follow-up
  if (!pendingFiles.length && inputText) {
    addMessage("user", inputText);
    textEl.value = "";
    const loadId = "load-" + Date.now();
    addMessage("bot", "", {loading:true, id:loadId});
    setLoading(true);
    try {
      const reply = await callAPI([{type:"text",text:inputText}]);
      removeById(loadId);
      addMessage("bot", reply);
      if (!hasResults) { hasResults=true; document.getElementById("export-btn").style.display="flex"; }
    } catch(err) {
      removeById(loadId);
      showError(err.message);
    }
    setLoading(false);
    return;
  }

  // File upload with batching
  const files = [...pendingFiles];
  const inputTextVal = inputText || ("Analyzing " + files.length + " sheet" + (files.length!==1?"s":"") + ".");
  const imageFiles = files.filter(f=>f.type.startsWith("image/"));
  const pdfFiles = files.filter(f=>f.type==="application/pdf");
  const previews = await Promise.all(imageFiles.slice(0,6).map(toPreview));

  addMessage("user", inputTextVal, {previews, pdfNames:pdfFiles.map(f=>f.name), totalFiles:files.length});
  textEl.value = "";
  pendingFiles = [];
  renderFileChips();
  setLoading(true);

  const batches = [];
  for (let i=0; i<files.length; i+=BATCH_SIZE) batches.push(files.slice(i,i+BATCH_SIZE));
  const total = batches.length;

  try {
    for (let b=0; b<batches.length; b++) {
      const batch = batches[b];
      const bn = b+1;
      const isFinal = bn===total;
      const start = b*BATCH_SIZE+1;
      const end = Math.min((b+1)*BATCH_SIZE, files.length);
      setProgress("Batch " + bn + " of " + total + " — sheets " + start + "–" + end + " of " + files.length + "...");

      const loadId = "load-" + Date.now();
      addMessage("bot", "", {loading:true, id:loadId, loadingText:"Batch "+bn+"/"+total+": analyzing sheets "+start+"–"+end+"..."});

      const contentParts = [];
      for (const f of batch) {
        if (f.type.startsWith("image/")) {
          const compressed = await compressImage(f);
          // Convert base64 back to bytes to verify actual size
          const byteLen = Math.round((compressed.data.length * 3) / 4);
          console.log("Compressed " + f.name + " to " + Math.round(byteLen/1024) + "KB at " + (compressed.finalDim||"?") + "px");
          if (byteLen > 4.8 * 1024 * 1024) {
            throw new Error("Sheet \"" + f.name + "\" could not be compressed below 5MB (" + Math.round(byteLen/1024/1024*10)/10 + "MB after compression). Please crop this sheet to just the elevation face in PDF24 and re-export before uploading.");
          }
          contentParts.push({type:"image", source:{type:"base64", media_type:compressed.mediaType, data:compressed.data}});
        } else {
          const data = await toBase64(f);
          const byteLen = Math.round((data.length * 3) / 4);
          if (byteLen > 4.8 * 1024 * 1024) {
            throw new Error("PDF \"" + f.name + "\" is " + Math.round(byteLen/1024/1024*10)/10 + "MB — too large. Please convert to JPEG at 150 DPI using PDF24 before uploading.");
          }
          contentParts.push({type:"document", source:{type:"base64", media_type:"application/pdf", data}});
        }
      }

      const batchText = isFinal && total>1
        ? "Final batch "+bn+"/"+total+" — sheets: "+batch.map(f=>f.name).join(", ")+". Analyze these and consolidate ALL findings from all batches into the complete final output."
        : total>1
        ? "Batch "+bn+"/"+total+" — sheets: "+batch.map(f=>f.name).join(", ")+". Extract data only — final tables come in the last batch."
        : "Analyze these "+files.length+" sheet"+(files.length!==1?"s":"")+" and produce the complete cleaning quote output.";

      contentParts.push({type:"text", text:batchText});

      const sysOverride = isFinal && total>1
        ? SYSTEM_PROMPT + "\n\nThis is the FINAL batch. Consolidate ALL data from all previous batches and produce the complete final tables now."
        : total>1
        ? SYSTEM_PROMPT + "\n\nBatch "+bn+" of "+total+". Extract data only — final tables come in the last batch."
        : SYSTEM_PROMPT;

      const reply = await callAPI(contentParts, sysOverride);
      removeById(loadId);

      if (isFinal) {
        addMessage("bot", reply);
        hasResults = true;
        document.getElementById("export-btn").style.display = "flex";
      } else {
        addMessage("bot", "**Batch " + bn + "/" + total + " processed.** Continuing...");
      }
    }
  } catch(err) {
    // remove any loading indicators
    document.querySelectorAll('[id^="load-"]').forEach(el=>el.remove());
    showError("Error: " + err.message);
  }

  setProgress("");
  setLoading(false);
}

// ── PDF Export ──
function exportPDF() {
  const projectName = document.getElementById("project-input").value || "Cleaning Quote";
  const msgs = document.querySelectorAll(".msg-bubble.bot");
  let content = "";
  msgs.forEach(m => { content += m.innerText + "\n\n---\n\n"; });

  const w = window.open("","_blank");
  if (!w) { alert("Allow popups to export PDF."); return; }
  w.document.write(`<!DOCTYPE html><html><head><title>${projectName}</title>
  <style>
    body{font-family:'Courier New',monospace;font-size:12px;color:#111;max-width:900px;margin:40px auto;padding:20px;}
    h1{font-size:20px;color:#b45309;border-bottom:2px solid #b45309;padding-bottom:8px;margin-bottom:16px;}
    h2{font-size:13px;color:#92400e;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid #d97706;padding-bottom:4px;margin:22px 0 9px;}
    table{width:100%;border-collapse:collapse;margin:10px 0 18px;}
    th{background:#fef3c7;color:#92400e;padding:7px 10px;text-align:left;border-bottom:2px solid #d97706;font-size:11px;}
    td{padding:5px 10px;border-bottom:1px solid #e5e7eb;font-size:11px;vertical-align:top;}
    tr:nth-child(even) td{background:#fffbeb;}
    strong{color:#92400e;}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid #d97706;}
    .title{font-size:22px;font-weight:bold;color:#b45309;letter-spacing:0.08em;}
    .meta{font-size:11px;color:#666;text-align:right;}
    hr{border:none;border-top:1px solid #e5e7eb;margin:20px 0;}
    @media print{body{margin:20px;}}
  </style></head><body>
  <div class="header">
    <div class="title">CLEANING QUOTE ESTIMATE</div>
    <div class="meta">Project: ${projectName}<br/>Generated: ${new Date().toLocaleDateString()}</div>
  </div>
  ${content.replace(/\n/g,"<br/>")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/# (.+)/g,"<h1>$1</h1>")
    .replace(/## (.+)/g,"<h2>$1</h2>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/---/g,"<hr/>")
  }
  </body></html>`);
  w.document.close();
  setTimeout(()=>w.print(), 600);
}

// ── New project ──
function newProject() {
  if (!confirm("Start a new project? Current results will be cleared.")) return;
  document.getElementById("messages").innerHTML = '<div id="bottom-anchor"></div>';
  conversationHistory = [];
  pendingFiles = [];
  isLoading = false;
  hasResults = false;
  renderFileChips();
  document.getElementById("export-btn").style.display = "none";
  document.getElementById("project-input").value = "";
  document.getElementById("text-input").value = "";
  setProgress("");
  hideError();
  addMessage("bot", WELCOME);
}

// ── File input handling ──
function triggerFileInput() {
  if (!isLoading) document.getElementById("file-input").click();
}
function onDragOver(e) { e.preventDefault(); if (!isLoading) document.getElementById("drop-zone").classList.add("dragging"); }
function onDragLeave() { document.getElementById("drop-zone").classList.remove("dragging"); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById("drop-zone").classList.remove("dragging");
  if (isLoading) return;
  const files = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("image/")||f.type==="application/pdf");
  pendingFiles = [...pendingFiles, ...files];
  renderFileChips();
}
function onFileChange(e) {
  const files = Array.from(e.target.files).filter(f=>f.type.startsWith("image/")||f.type==="application/pdf");
  pendingFiles = [...pendingFiles, ...files];
  renderFileChips();
  e.target.value = "";
}

function renderFileChips() {
  const container = document.getElementById("file-chips");
  container.innerHTML = "";
  if (!pendingFiles.length) return;
  pendingFiles.forEach((f,i) => {
    const chip = document.createElement("div");
    chip.className = "file-chip";
    chip.innerHTML = `📄 <span class="chip-name">${f.name}</span><button class="chip-remove" onclick="removeFile(${i})">×</button>`;
    container.appendChild(chip);
  });
  const count = document.createElement("span");
  count.id = "chip-count";
  count.textContent = pendingFiles.length + " file" + (pendingFiles.length!==1?"s":"") + " · " + Math.ceil(pendingFiles.length/BATCH_SIZE) + " batch" + (Math.ceil(pendingFiles.length/BATCH_SIZE)!==1?"es":"");
  container.appendChild(count);
}

function removeFile(i) {
  pendingFiles.splice(i,1);
  renderFileChips();
}

function onKeyDown(e) {
  if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
}

// ── Init ──
addMessage("bot", WELCOME);
</script>
